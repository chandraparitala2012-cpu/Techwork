<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 158" role="img" aria-label="DataTechZ">
  <defs>
    <linearGradient id="lg-main" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A4B8C"/>
      <stop offset="50%" stop-color="#0074CF"/>
      <stop offset="100%" stop-color="#00C8D4"/>
    </linearGradient>
    <linearGradient id="lg-arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0052CC"/>
      <stop offset="100%" stop-color="#00E8FF"/>
    </linearGradient>
    <linearGradient id="lg-text" gradientUnits="userSpaceOnUse" x1="275" y1="0" x2="490" y2="0">
      <stop offset="0%" stop-color="#0055CC"/>
      <stop offset="100%" stop-color="#00C8D4"/>
    </linearGradient>
    <radialGradient id="rg-bg" cx="52%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#0B2444"/>
      <stop offset="100%" stop-color="#060F20"/>
    </radialGradient>
    <radialGradient id="rg-glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#00C8D4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00C8D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg-eye" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="100%" stop-color="#0077BB" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- ── ICON (center 79,79) ── -->

  <!-- Background circle -->
  <circle cx="79" cy="79" r="63" fill="url(#rg-bg)"/>

  <!-- Outer glow rings -->
  <circle cx="79" cy="79" r="68" fill="none" stroke="url(#lg-main)" stroke-width="0.6" opacity="0.2"/>
  <circle cx="79" cy="79" r="64" fill="none" stroke="url(#lg-main)" stroke-width="0.4" opacity="0.15"/>

  <!-- D-RING main border (~300° arc, open upper-left) -->
  <path d="M 34,22 A 63,63 0 1 1 22,100"
        fill="none" stroke="url(#lg-main)" stroke-width="3.2" stroke-linecap="round"/>

  <!-- D corner nodes -->
  <circle cx="34"  cy="22"  r="4.5" fill="#0055CC"/>
  <circle cx="22"  cy="100" r="4.5" fill="#0055CC"/>
  <circle cx="142" cy="79"  r="4.5" fill="#00C8D4"/>

  <!-- ── FACE (right half of circle, centered ~93,72) ── -->
  <circle cx="93" cy="68" r="42" fill="url(#rg-glow)"/>

  <!-- Head silhouette -->
  <path d="M 93,32 C 110,32 123,44 123,60 C 123,74 117,84 109,90 L 109,103 L 77,103 L 77,90 C 69,84 63,74 63,60 C 63,44 76,32 93,32 Z"
        fill="#060E1C" stroke="#0080BB" stroke-width="1.2" opacity="0.7"/>

  <!-- Skull top circuit -->
  <line x1="93" y1="32"  x2="93"  y2="25"  stroke="#00C8D4" stroke-width="1" opacity="0.65"/>
  <line x1="93" y1="25"  x2="80"  y2="25"  stroke="#00C8D4" stroke-width="1" opacity="0.55"/>
  <line x1="93" y1="25"  x2="106" y2="25"  stroke="#00C8D4" stroke-width="1" opacity="0.55"/>
  <circle cx="80"  cy="25" r="2.2" fill="#0066CC" opacity="0.8"/>
  <circle cx="106" cy="25" r="2.2" fill="#00C8D4" opacity="0.8"/>

  <!-- AI badge (forehead) -->
  <rect x="83" y="37" width="20" height="14" rx="3.5" fill="#050E1E" stroke="#00C8D4" stroke-width="1.1"/>
  <text x="93" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="9" fill="#00C8D4">AI</text>

  <!-- Left eye -->
  <ellipse cx="82"  cy="64" rx="6.5" ry="7"   fill="#040C18" stroke="#00C8D4" stroke-width="1.4"/>
  <ellipse cx="82"  cy="64" rx="3.8" ry="4.1"  fill="url(#rg-eye)"/>
  <circle  cx="83"  cy="62" r="1.3"             fill="white" opacity="0.75"/>

  <!-- Right eye -->
  <ellipse cx="104" cy="64" rx="6.5" ry="7"   fill="#040C18" stroke="#00C8D4" stroke-width="1.4"/>
  <ellipse cx="104" cy="64" rx="3.8" ry="4.1"  fill="url(#rg-eye)"/>
  <circle  cx="105" cy="62" r="1.3"             fill="white" opacity="0.75"/>

  <!-- Nose -->
  <path d="M 93,69 L 89,79 L 97,79" fill="none" stroke="#009AB8" stroke-width="1.1" opacity="0.7"/>

  <!-- Mouth -->
  <path d="M 84,87 Q 93,93 102,87" fill="none" stroke="#009AB8" stroke-width="1.1" opacity="0.65"/>

  <!-- Temple circuit lines -->
  <line x1="63"  y1="64" x2="75"  y2="64" stroke="#00C8D4" stroke-width="1.1" opacity="0.7"/>
  <line x1="111" y1="64" x2="123" y2="64" stroke="#00C8D4" stroke-width="1.1" opacity="0.7"/>
  <circle cx="63"  cy="64" r="2.2" fill="#0055CC" opacity="0.8"/>
  <circle cx="123" cy="64" r="2.2" fill="#00C8D4" opacity="0.8"/>

  <!-- Side circuit branches -->
  <path d="M 63,74 L 54,74 L 54,50 L 66,50"  fill="none" stroke="#0066AA" stroke-width="1" opacity="0.5"/>
  <path d="M 123,74 L 132,74 L 132,50 L 120,50" fill="none" stroke="#00C8D4" stroke-width="1" opacity="0.5"/>
  <circle cx="54"  cy="50" r="2" fill="#0055CC" opacity="0.7"/>
  <circle cx="132" cy="50" r="2" fill="#00C8D4" opacity="0.7"/>

  <!-- Chin circuit -->
  <path d="M 77,90 L 77,108 L 86,108"   fill="none" stroke="#006699" stroke-width="0.9" opacity="0.45"/>
  <path d="M 109,90 L 109,108 L 100,108" fill="none" stroke="#00C8D4" stroke-width="0.9" opacity="0.45"/>
  <line x1="86" y1="108" x2="100" y2="108" stroke="#006699" stroke-width="0.9" opacity="0.35"/>

  <!-- Neural dots -->
  <circle cx="93"  cy="34" r="2.2" fill="#00C8D4" opacity="0.65"/>
  <circle cx="78"  cy="56" r="1.8" fill="#0088CC" opacity="0.6"/>
  <circle cx="108" cy="56" r="1.8" fill="#0088CC" opacity="0.6"/>

  <!-- ── BAR CHART (lower-left inside circle) ── -->
  <rect x="38" y="101" width="8" height="22" rx="2" fill="url(#lg-main)" opacity="0.75"/>
  <rect x="49" y="92"  width="8" height="31" rx="2" fill="url(#lg-main)" opacity="0.88"/>
  <rect x="60" y="108" width="8" height="15" rx="2" fill="url(#lg-main)" opacity="0.65"/>

  <!-- ── DATA PIXEL BLOCKS (left edge / outside ring) ── -->
  <rect x="5"  y="20" width="11" height="11" rx="2.5" fill="#00C8D4" opacity="0.78"/>
  <rect x="18" y="16" width="9"  height="9"  rx="2"   fill="#00C8D4" opacity="0.58"/>
  <rect x="18" y="27" width="8"  height="8"  rx="2"   fill="#0066CC" opacity="0.50"/>
  <rect x="5"  y="33" width="10" height="10" rx="2"   fill="#0066CC" opacity="0.65"/>
  <rect x="5"  y="46" width="9"  height="9"  rx="2"   fill="#00C8D4" opacity="0.52"/>
  <rect x="18" y="40" width="7"  height="7"  rx="1.5" fill="#00C8D4" opacity="0.40"/>
  <rect x="5"  y="88" width="8"  height="8"  rx="2"   fill="#0066CC" opacity="0.48"/>
  <rect x="5"  y="99" width="10" height="10" rx="2"   fill="#00C8D4" opacity="0.55"/>
  <rect x="16" y="93" width="7"  height="7"  rx="1.5" fill="#0066CC" opacity="0.37"/>
  <rect x="5"  y="112" width="8" height="8"  rx="2"   fill="#00C8D4" opacity="0.40"/>

  <!-- ── PIXEL ACCENTS (top-right, beyond ring) ── -->
  <rect x="133" y="9"  width="10" height="10" rx="2.5" fill="#00C8D4" opacity="0.72"/>
  <rect x="146" y="5"  width="8"  height="8"  rx="2"   fill="#00C8D4" opacity="0.52"/>
  <rect x="146" y="16" width="7"  height="7"  rx="1.5" fill="#0066CC" opacity="0.45"/>
  <rect x="133" y="22" width="7"  height="7"  rx="1.5" fill="#0066CC" opacity="0.40"/>
  <rect x="156" y="10" width="6"  height="6"  rx="1"   fill="#00C8D4" opacity="0.34"/>

  <!-- ── DIAGONAL ARROW (lower-left → upper-right, breaks out of ring) ── -->
  <!-- Glow layer -->
  <line x1="50" y1="119" x2="141" y2="13" stroke="url(#lg-arrow)" stroke-width="6" stroke-linecap="round" opacity="0.22"/>
  <!-- Main shaft -->
  <line x1="50" y1="119" x2="141" y2="13" stroke="url(#lg-arrow)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="141,13 126,21 134,7" fill="#00EEFF"/>
  <!-- Base dot -->
  <circle cx="50" cy="119" r="5.5" fill="#0055CC" opacity="0.75"/>
  <circle cx="50" cy="119" r="3"   fill="#0088EE"/>

  <!-- ── NETWORK DOTS (lower area) ── -->
  <circle cx="62"  cy="121" r="3.2" fill="#0066BB" opacity="0.75"/>
  <circle cx="108" cy="121" r="3.2" fill="#00C8D4" opacity="0.75"/>
  <circle cx="85"  cy="136" r="2.8" fill="#0055CC" opacity="0.55"/>
  <line x1="62"  y1="121" x2="85"  y2="136" stroke="#0066BB" stroke-width="1"   opacity="0.45"/>
  <line x1="108" y1="121" x2="85"  y2="136" stroke="#00C8D4" stroke-width="1"   opacity="0.45"/>
  <line x1="62"  y1="121" x2="108" y2="121" stroke="#0055CC" stroke-width="0.9" opacity="0.3"/>

  <!-- ══════════════════════════════
       TEXT
       ══════════════════════════════ -->

  <!-- DATATECHZ: DATA=white (dark-bg), TECHZ=teal gradient -->
  <text font-family="'Arial Black','Franklin Gothic Heavy','Impact',sans-serif"
        font-weight="900" font-size="52" letter-spacing="-1.5">
    <tspan x="174" y="91" fill="white">DATA</tspan><tspan fill="url(#lg-text)">TECHZ</tspan>
  </text>

  <!-- Tagline -->
  <text x="174" y="117" font-family="Arial,sans-serif" font-size="15" fill="#7A9AB8" letter-spacing="0.3">
    Beyond <tspan font-weight="700" fill="#8AAAC8">Insight</tspan>, Into <tspan font-weight="700" fill="#8AAAC8">Action.</tspan>
  </text>
</svg>
