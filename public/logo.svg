<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 50" width="210" height="50" role="img" aria-label="DataTechZ">
  <defs>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A4B8C"/>
      <stop offset="60%" stop-color="#0074CF"/>
      <stop offset="100%" stop-color="#00C8D4"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="54" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- Icon: outer circle -->
  <circle cx="25" cy="25" r="22" fill="url(#icon-bg)" stroke="url(#icon-grad)" stroke-width="1.4"/>

  <!-- D letter outline -->
  <path d="M14 13 L14 37 L23 37 C32 37 38 31.5 38 25 C38 18.5 32 13 23 13 Z"
        fill="none" stroke="url(#icon-grad)" stroke-width="2.2"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- D inner fill (very subtle) -->
  <path d="M17.5 16.5 L17.5 33.5 L23 33.5 C29.5 33.5 34.5 29.5 34.5 25 C34.5 20.5 29.5 16.5 23 16.5 Z"
        fill="url(#icon-grad)" opacity="0.08"/>

  <!-- Corner circuit nodes on D -->
  <circle cx="14" cy="13" r="2" fill="#0066FF"/>
  <circle cx="14" cy="37" r="2" fill="#0066FF"/>
  <circle cx="38" cy="25" r="2.2" fill="#00D4FF"/>

  <!-- Data pixel blocks (left side — represents raw data) -->
  <rect x="5" y="14" width="4" height="4" rx="1" fill="#00D4FF" opacity="0.6"/>
  <rect x="5" y="20" width="4" height="4" rx="1" fill="#0066FF" opacity="0.45"/>
  <rect x="5" y="26" width="4" height="4" rx="1" fill="#00D4FF" opacity="0.35"/>
  <rect x="5" y="32" width="4" height="4" rx="1" fill="#0066FF" opacity="0.25"/>

  <!-- Top-right pixel accents (upward trajectory) -->
  <rect x="37" y="7"  width="3.5" height="3.5" rx="0.8" fill="#00D4FF" opacity="0.7"/>
  <rect x="43" y="7"  width="2.5" height="2.5" rx="0.6" fill="#00D4FF" opacity="0.45"/>
  <rect x="43" y="12" width="2"   height="2"   rx="0.5" fill="#0066FF" opacity="0.4"/>

  <!-- Arrow line through D (insight to action) -->
  <line x1="18" y1="34" x2="36" y2="13"
        stroke="url(#arrow-grad)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="36,13 30,12.5 33.5,18.5" fill="#00D4FF"/>

  <!-- Center glow node (AI node) -->
  <circle cx="25" cy="25" r="3"   fill="none" stroke="#00B4C8" stroke-width="1.2" opacity="0.5"/>
  <circle cx="25" cy="25" r="1.2" fill="#00D4FF" opacity="0.75"/>

  <!-- Small connecting lines (circuit feel) -->
  <line x1="14" y1="13" x2="9"  y2="14" stroke="#0066FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="14" y1="37" x2="9"  y2="32" stroke="#0066FF" stroke-width="0.8" opacity="0.5"/>
  <line x1="9"  y1="14" x2="9"  y2="32" stroke="#0066FF" stroke-width="0.8" opacity="0.3"/>

  <!-- TEXT: DATA (white) + TECHZ (gradient) -->
  <text font-family="'Plus Jakarta Sans', system-ui, sans-serif"
        font-weight="800" font-size="19" letter-spacing="-0.4">
    <tspan x="54" y="28" fill="white">DATA</tspan><tspan fill="url(#text-grad)">TECHZ</tspan>
  </text>

  <!-- Tagline -->
  <text x="54" y="42"
        font-family="'Plus Jakarta Sans', system-ui, sans-serif"
        font-size="8.5" fill="#94A3B8" letter-spacing="0.2">Beyond Insight, Into Action.</text>
</svg>
