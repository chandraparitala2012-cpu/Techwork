services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datatechz-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - datatechz-net

  nginx:
    image: nginx:alpine
    container_name: datatechz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment when you have SSL certificates:
      # - ./ssl/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - web
    networks:
      - datatechz-net

networks:
  datatechz-net:
    driver: bridge
